services:
  postgres:
    image: imresamu/postgis:16-3.5-alpine
    environment:
      POSTGRES_USER: wxdecide
      POSTGRES_PASSWORD: wxdecide
      POSTGRES_DB: wxdecide
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wxdecide -d wxdecide"]
      interval: 5s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  metabase_data:
